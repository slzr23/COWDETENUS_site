<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Défis - Cow'Détenus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="donnees.js"></script>
    <style>
        /* --- BOUTON RETOUR & MINI LOGO --- */
        .btn-back {
            position: absolute;
            top: clamp(15px, 3vw, 30px);
            left: clamp(15px, 3vw, 30px);
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--dark-bg); color: var(--text-muted);
            border: 1px solid #333; border-radius: 5px;
            padding: 8px 15px; font-family: var(--font-title); font-size: 1.2rem;
            letter-spacing: 1px; text-decoration: none; transition: 0.3s ease; z-index: 10;
        }
        .btn-back:hover {
            color: var(--prison-orange); border-color: var(--prison-orange);
            background: rgba(255, 95, 0, 0.1); transform: translateX(-5px);
        }
        .mini-logo {
            width: 80px; height: 80px; border-radius: 50%;
            border: 2px dashed var(--prison-orange);
            box-shadow: 0 0 20px rgba(255, 95, 0, 0.2);
            object-fit: cover; margin-bottom: 10px;
        }
        
        @media (max-width: 768px) {
            .btn-back { 
                position: absolute; 
                top: 20px; 
                left: 20px; 
                padding: 10px 15px; 
                margin-bottom: 0;
            }
            .btn-back span { display: none; } /* Cache le mot "Retour" sur mobile */
            header { display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        }
    </style>
</head>
<body>
    <header style="position: relative;">
        <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> <span>Retour</span></a>
        <img src="assets/image0.jpeg" alt="Logo" class="mini-logo" onerror="this.src='https://via.placeholder.com/80x80/ff6600/000?text=COW'">
        <h1>MISSIONS CLANDESTINES</h1>
    </header>

    <div class="container">
        <h2>Rachète ta <span>Liberté</span></h2>
        <p style="text-align:center; color:#aaa; margin-bottom: 40px; font-size: 1.1rem;">Accomplis la mission. Prends une photo. Envoie-nous la preuve sur Insta pour gagner du respect.</p>
        
        <div class="grid-layout" id="defis-grid"></div>
    </div>

    <footer><p>© 2026 COW'DÉTENUS</p></footer>

    <script>
        window.onload = () => {
            const container = document.getElementById('defis-grid');
            const lienInsta = "https://www.instagram.com/les_cowdetenus"; 

            if(SITE_DATA && SITE_DATA.defis) {
                SITE_DATA.defis.forEach(defi => {
                    // C'est ici que l'on rajoute object-position: center; pour ne plus couper l'image
                    let imgHTML = defi.image ? `<img src="${defi.image}" style="width:calc(100% + 50px); height:200px; object-fit:cover; object-position: center; border-bottom: 2px dashed #444; margin: -25px -25px 15px -25px;">` : '';
                    
                    container.innerHTML += `
                        <div class="card" style="display:flex; flex-direction:column;">
                            ${imgHTML}
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px;">
                                <span style="background:#333; padding:3px 10px; font-weight:bold; font-size:0.8rem; text-transform:uppercase; border-radius: 3px;">${defi.categorie}</span>
                                <span style="color:var(--prison-orange); font-family:var(--font-title); font-size:1.8rem;">+${defi.points} XP</span>
                            </div>
                            <h3 style="font-size: clamp(1.5rem, 5vw, 2.2rem); margin:0 0 10px 0;">${defi.titre}</h3>
                            <p style="flex-grow:1; color:#aaa; margin-top:0;">${defi.desc}</p>
                            
                            <a href="${lienInsta}" target="_blank" class="btn" style="width:100%; margin-top:15px; border-color:#E1306C; color:#fff; background-color: rgba(225, 48, 108, 0.1);">
                                <i class="fab fa-instagram"></i> Envoyer Preuve
                            </a>
                        </div>
                    `;
                });
            }
        };
    </script>
</body>
</html>
