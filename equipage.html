<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registre d'Écrou - Cow'Détenus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="donnees.js"></script>
    <style>
        .mugshot-container {
            height: 250px; position: relative; background-color: #222; overflow: hidden;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, #444 39px, #444 40px);
            border-bottom: 3px solid var(--prison-orange); margin: -25px -25px 20px -25px;
        }
        .mugshot-img {
            width: 100%; height: 100%; object-fit: cover; object-position: center;
            filter: grayscale(100%) contrast(1.2); transition: 0.4s ease;
        }
        .card:hover .mugshot-img { filter: grayscale(0%); transform: scale(1.05); }
        
        .inmate-board {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: #000; border: 2px solid #fff; padding: 5px 15px;
            font-family: var(--font-data); font-size: 0.9rem; font-weight: bold;
            box-shadow: 2px 2px 0 #fff; z-index: 2; white-space: nowrap;
        }

        .role-txt { color: var(--prison-orange); font-family: var(--font-title); font-size: 1.5rem; margin: 0; }
        
        /* Modal Style */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center; backdrop-filter: blur(5px);}
        .modal-content {
            background: var(--card-bg);
            border: 2px solid var(--prison-orange);
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            padding: 30px;
            position: relative;
            border-top: 15px solid var(--prison-orange);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .close-btn { position: absolute; top: 10px; right: 15px; color: #fff; font-size: 2rem; background: none; border: none; cursor: pointer; }
        .stamp-guilty { position: absolute; top: 20px; left: 20px; color: var(--siren-red); border: 4px solid var(--siren-red); padding: 5px 10px; font-family: var(--font-title); font-size: 2.5rem; transform: rotate(-15deg); opacity: 0.8; pointer-events: none;}
        .desc-scroll {
            color: #ccc;
            line-height: 1.6;
            margin-top: 20px;
            white-space: pre-line;
            overflow-y: scroll;
            padding-right: 8px;
            max-height: min(42vh, 360px);
            scrollbar-width: thin;
            scrollbar-color: var(--prison-orange) #222;
            scrollbar-gutter: stable;
            -webkit-overflow-scrolling: touch;
        }
        .desc-scroll::-webkit-scrollbar { width: 8px; }
        .desc-scroll::-webkit-scrollbar-track { background: #222; }
        .desc-scroll::-webkit-scrollbar-thumb { background: var(--prison-orange); border-radius: 8px; }
        @media (max-width: 768px) {
            .desc-scroll { padding-right: 6px; }
            .desc-scroll::-webkit-scrollbar { width: 10px; }
            .desc-scroll::-webkit-scrollbar-thumb { border: 2px solid #222; }
        }
        
        .btn-back {
            position: absolute;
            top: clamp(15px, 3vw, 30px);
            left: clamp(15px, 3vw, 30px);
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--dark-bg); color: var(--text-muted);
            border: 1px solid #333; border-radius: 5px;
            padding: 8px 15px; font-family: var(--font-title); font-size: 1.2rem;
            letter-spacing: 1px; text-decoration: none; transition: 0.3s ease; z-index: 10;
        }
        .btn-back:hover {
            color: var(--prison-orange); border-color: var(--prison-orange);
            background: rgba(255, 95, 0, 0.1); transform: translateX(-5px);
        }
        .mini-logo {
            width: 80px; height: 80px; border-radius: 50%;
            border: 2px dashed var(--prison-orange);
            box-shadow: 0 0 20px rgba(255, 95, 0, 0.2);
            object-fit: cover; margin-bottom: 10px;
        }
        @media (max-width: 768px) {
            .btn-back { 
                position: absolute; /* Reste épinglé en haut à gauche */
                top: 20px; 
                left: 20px; 
                padding: 10px 15px; 
                margin-bottom: 0;
            }
            .btn-back span { display: none; } /* Cache le mot "Retour" */
            header { display: flex; flex-direction: column; align-items: center; padding-top: 50px; } /* Laisse de la place pour le logo */
        }
    </style>
</head>
<body>
    <header style="position: relative;">
        <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> <span>Retour</span></a>
        <img src="assets/image0.jpeg" alt="Logo" class="mini-logo" onerror="this.src='https://via.placeholder.com/80x80/ff6600/000?text=COW'">
        <h1>Les <span>Détenus</span></h1>
    </header>
    <div class="container">
        <h2>Les <span>Détenus</span></h2>
        <div class="grid-layout" id="inmate-grid"></div>
    </div>

    <div class="modal" id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div class="stamp-guilty">COUPABLE</div>
            <img id="m-img" src="" style="width:120px; height:120px; border-radius:50%; border:3px solid #fff; object-fit:cover; display:block; margin: 0 auto 20px auto;">
            <h2 id="m-pseudo" style="margin-bottom:0; font-size: 3rem; border:none;">PSEUDO</h2>
            <p id="m-nom" style="text-align:center; color:#888; font-weight:bold; margin-top:0;">Nom</p>
            <div style="background:#000; padding:15px; border:1px dashed #555; margin-top:20px;">
                <p style="color:var(--siren-red); font-weight:bold; margin:0 0 5px 0;">MOTIF D'INCARCÉRATION :</p>
                <p id="m-crime" style="margin:0; color:#fff; font-size: 1.1rem;"></p>
            </div>
            <p id="m-desc" class="desc-scroll"></p>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById('inmate-grid');
            if(SITE_DATA && SITE_DATA.equipage) {
                SITE_DATA.equipage.forEach(inmate => {
                    const id = Math.floor(100000 + Math.random() * 900000); // Faux numéro
                    container.innerHTML += `
                        <div class="card" onclick='openModal(${JSON.stringify(inmate).replace(/'/g, "&#39;")})'>
                            <div class="mugshot-container">
                                <img src="${inmate.img}" class="mugshot-img" onerror="this.src='https://via.placeholder.com/300x300/333/666?text=NO+PHOTO'">
                                <div class="inmate-board">ID: #${id}</div>
                            </div>
                            <h3 style="margin:0; font-size:2rem;">${inmate.pseudo}</h3>
                            <p class="role-txt">${inmate.role}</p>
                        </div>
                    `;
                });
            }
        });

        function openModal(data) {
            document.getElementById('m-img').src = data.img;
            document.getElementById('m-pseudo').innerText = data.pseudo;
            document.getElementById('m-nom').innerText = data.nom;
            document.getElementById('m-crime').innerText = data.crime;
            document.getElementById('m-desc').innerText = data.desc;
            document.getElementById('modal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
